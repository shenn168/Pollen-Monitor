<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PollenWatch - Forecast</title>
  <link rel="stylesheet" href="sidebar.css">
</head>
<body>
  <div id="sidebar-app">
    <header>
      <span class="logo">🌿</span>
      <h1>PollenWatch Forecast</h1>
    </header>
    <div id="sidebar-location"></div>
    <div id="sidebar-loading" class="hidden">
      <div class="spinner"></div>
      <p>Loading forecast...</p>
    </div>
    <div id="sidebar-error" class="hidden"></div>
    <div id="forecast-container"></div>
    <div id="legend">
      <div class="legend-title">Severity Scale</div>
      <div class="legend-items">
        <span>⚪ None</span>
        <span>🟢 Low</span>
        <span>🟡 Moderate</span>
        <span>🟠 High</span>
        <span>🔴 Very High</span>
        <span>🟣 Extreme</span>
      </div>
    </div>
  </div>
  <script src="utils.js"></script>
  <script src="sidebar.js"></script>
</body>
</html>
